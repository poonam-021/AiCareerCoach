spring.application.name=AiCareerCoach

# ===== Supabase PostgreSQL (Session Pooler recommended for a persistent backend) =====
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:5432/postgres?sslmode=require
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===== Supabase Storage (for resume files) =====
supabase.url=${SUPABASE_URL}
supabase.storage.bucket=resumes
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# ===== AI Backend =====
ai-backend.base-url=${AI_BACKEND_URL:http://localhost:8000}

# ===== Server =====
server.port=8080